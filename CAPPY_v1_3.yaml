# ----------------------------
# CAPPY v20 config.yaml
# ----------------------------

storage:
  # Base output directory (GUI Browse points here)
  data_dir: "dataFile"

acq:
  # Channels: A=1, B=2, A|B=3
  channels_mask: "A|B"

  # Dual-channel packing:
  #   auto        = detect blocked vs interleaved each buffer (recommended)
  #   blocked     = AAAA...BBBB...
  #   interleaved = A0,B0,A1,B1,...
  data_layout: "auto"

  # Typical acquisition settings (edit to match your run)
  samples_per_record: 256
  records_per_buffer: 128
  sample_rate_hz: 500000000  # 500 MS/s example
  record_length_seconds: 1.0e-6  # optional; used mainly for display

channels:
  A:
    input_range_vpp: 0.4
    coupling: "DC"
  B:
    input_range_vpp: 0.4
    coupling: "DC"

integrate:
  # Integration window in samples (edit as needed)
  start_sample: 0
  end_sample: 256

notify:
  # Heartbeat status file cadence (seconds)
  heartbeat_seconds: 1.0

  # Fast GUI/stat flush cadence (buffers)
  # This is what makes mean integral / stats update more often.
  gui_every_buffers: 10

  # Leave this if you still want the older “dashboard summary” behavior
  dashboard_every_buffers: 1000

  # Email settings (optional)
  enabled: false
  to_email: "naiannyza@gmail.com"
  interval_minutes: 120

live:
  # Ring buffer storage for waveforms (written EVERY buffer)
  ring_slots: 8192
  ring_points: 512

  # GUI consumption / scrolling behavior
  max_waveforms_per_tick: 400
  stream_window_points: 50000
